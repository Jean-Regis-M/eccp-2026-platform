services:
  - type: web
    name: eccp-2026-platform
    env: node
    plan: starter
    region: frankfurt
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: eccpmentor.regismukiza@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: DB_PATH
        value: /data/eccp.db
      - key: ALLOWED_ORIGIN
        value: https://eccp-2026-platform.onrender.com
    disk:
      name: eccp-database
      mountPath: /data
      sizeGB: 1
    autoDeploy: true